<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>sped-e</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0 }
    body {
      background: #1a1a1a;
      color: #e0e0e0;
      font-family: 'SF Mono', 'Fira Code', monospace;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    #header {
      background: #111;
      border-bottom: 1px solid #333;
      padding: 8px 16px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }
    #header h1 {
      font-size: 14px;
      color: #888;
      font-weight: normal;
      letter-spacing: 2px;
    }
    #status {
      font-size: 12px;
      color: #555;
    }
    #status.playing { color: #4ec9b0 }
    #status.connected { color: #4ec9b0 }

    #main {
      display: flex;
      flex: 1;
      min-height: 0;
    }

    /* Left: terminal */
    #terminal-panel {
      width: 50%;
      border-right: 1px solid #333;
      display: flex;
      flex-direction: column;
    }
    #terminal-label {
      padding: 6px 12px;
      font-size: 11px;
      color: #555;
      border-bottom: 1px solid #222;
      flex-shrink: 0;
    }
    #terminal {
      flex: 1;
      padding: 4px;
      overflow: hidden;
    }

    /* Right: playback */
    #playback-panel {
      width: 50%;
      display: flex;
      flex-direction: column;
      padding: 8px;
      gap: 8px;
      min-height: 0;
    }
    #playback-label {
      font-size: 11px;
      color: #555;
    }

    /* Tracks area — each track is a self-contained unit */
    #tracks {
      flex: 1;
      overflow-y: auto;
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 4px 0;
    }
    .track-unit {
      border: 1px solid #2a2a2a;
      border-radius: 4px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .track-unit-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 8px;
      background: #161616;
      font-size: 11px;
      color: #666;
    }
    .track-unit-canvas {
      display: block;
      width: 100%;
      height: 50px;
      background: #111;
    }
    .track-unit-buttons {
      display: flex;
      gap: 1px;
      background: #111;
      border-top: 1px solid #1a1a1a;
    }
    .track-unit-btn {
      flex: 1;
      background: #111;
      border: none;
      border-right: 1px solid #1a1a1a;
      color: #555;
      padding: 3px 0;
      font-size: 10px;
      cursor: pointer;
      font-family: monospace;
    }
    .track-unit-btn:hover { background: #1a1a1a; color: #4ec9b0; }
    .track-unit-btn.active { background: #0d1a1a; color: #4ec9b0; }
    .track-unit-panel {
      display: none;
      background: #0d0d0d;
      border-top: 1px solid #1a1a1a;
      max-height: 200px;
      overflow: auto;
    }
    .region {
      background: #1e3a4a;
      border: 1px solid #2a5a6a;
      border-radius: 3px;
      padding: 4px 8px;
      font-size: 11px;
      display: flex;
      gap: 12px;
      color: #8cc8d8;
    }
    .region .file { color: #4ec9b0; }
    .region .time { color: #666; }

    /* Transport */
    #transport {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    #play-btn {
      background: #2a4a3a;
      border: 1px solid #3a6a4a;
      color: #4ec9b0;
      padding: 6px 16px;
      border-radius: 3px;
      cursor: pointer;
      font-family: inherit;
      font-size: 13px;
    }
    #play-btn:hover { background: #3a5a4a }
    #stop-btn {
      background: #3a2a2a;
      border: 1px solid #5a3a3a;
      color: #c07070;
      padding: 6px 16px;
      border-radius: 3px;
      cursor: pointer;
      font-family: inherit;
      font-size: 13px;
    }
    #stop-btn:hover { background: #4a3a3a }
    #time-display {
      font-size: 13px;
      color: #666;
      font-variant-numeric: tabular-nums;
    }
    #no-edl {
      color: #444;
      font-size: 12px;
      text-align: center;
      padding: 32px;
    }
  </style>
</head>
<body>

<div id="header">
  <h1>SPED-E</h1>
  <span id="status">connecting...</span>
</div>

<div id="main">
  <div id="terminal-panel">
    <div id="terminal-label">shell</div>
    <div id="terminal"></div>
  </div>

  <div id="playback-panel">
    <div id="playback-label">playback</div>
    <div id="tracks">
      <div id="no-edl" style="color:#444;font-size:12px;text-align:center;padding:32px">
        run <code>sped import audio/file.wav</code> to start
      </div>
    </div>
    <div id="transport">
      <button id="play-btn">▶ play</button>
      <button id="stop-btn">■ stop</button>
      <span id="time-display">0:00.000</span>
      <button id="export-btn" style="margin-left:auto;background:#1a2a1a;border:1px solid #2a5a2a;color:#4ec9b0;padding:6px 12px;border-radius:3px;cursor:pointer;font-family:monospace;font-size:12px">⬇ export wav</button>
      <span id="export-status" style="font-size:11px;color:#555;margin-left:6px"></span>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
<script src="js/player.js"></script>
  <script src="js/graph.js"></script>
  <script src="js/exporter.js"></script>
<script src="js/app.js"></script>
</body>
</html>
